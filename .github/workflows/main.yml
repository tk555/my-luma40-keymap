name: Build Luma40 Firmware

on:
  push:
    branches: 
        - main 
        - 'test/*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # # 1. 自分のキーマップリポジトリをチェックアウト
      # - name: Checkout keymap repo
      #   uses: actions/checkout@v4

      # 2. QMK CLIのインストール（最新のpipxを使用）
      - name: Install QMK CLI
        run: pipx install qmk

      # 3. carlosedp氏のフォーク版をセットアップ
      - name: QMK setup with fork
        run: qmk setup carlosedp/qmk_firmware -y
        # 💡 もしluma40のコードが main ブランチではなく別のブランチにある場合は、
        # run: qmk setup carlosedp/qmk_firmware -b <ブランチ名> -y
        # のように -b でブランチを指定してください。

      - name: Install Toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc-arm-none-eabi gcc-avr avr-libc

      # # 5. キーマップファイルのコピー
      # - name: Copy keymap files
      #   run: |
      #     mkdir -p /home/runner/qmk_firmware/keyboards/epomaker/luma40/keymaps/tk555
      #     # リポジトリ内の全ファイル(keymap.cやrules.mkなど)をコピー
      #     cp -r * /home/runner/qmk_firmware/keyboards/epomaker/luma40/keymaps/tk555/

      # 6. Luma40のコンパイル実行
      - name: Compile firmware
        # run: qmk compile -kb epomaker/luma40 -km tk555
        run: qmk compile -kb epomaker/luma40

      # 7. 生成されたファームウェアのアップロード
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: luma40-firmware
          # マイコンによって拡張子が違うので、念のため .bin も追加して拾えるようにしています
          path: |
            /home/runner/qmk_firmware/*.hex
            /home/runner/qmk_firmware/*.uf2
            /home/runner/qmk_firmware/*.bin
            /home/runner/qmk_firmware/.build/*.hex
            /home/runner/qmk_firmware/.build/*.uf2
            /home/runner/qmk_firmware/.build/*.bin
